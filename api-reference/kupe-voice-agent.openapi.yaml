  /api/call/create_call:
    post:
      tags: ["Outbound calls"]
      summary: Initiate outbound call
      description: |
        **Full URL (query string, not JSON body):**  
        `POST https://api.kupe.in/api/call/create_call?phoneNumber=%2B15551234567&user_id={uuid}&agent_id={uuid}`

        Places an outbound PSTN call. **Query parameters** (not JSON body): `phoneNumber`, `user_id`, optional `agent_id`,
        `workflow_id`, `phone_number_id`. Optional `Origin` header must pass allow-list if present.

        **Destination numbers:** use **E.164** with country code — e.g. **+91** for India, **+1** for the United States
        (URL-encode the `+` as `%2B` in curl).

        **Outbound line:** when `phone_number_id` is set (or can be inferred from the agent/workflow mapping), Kupe uses
        that row’s telephony backend. When no row is resolved, a legacy fallback may use the first available line for the user.

        **Auth:** this path is excluded from `x-api-key` / Supabase JWT in the backend — treat it as a **server-side** integration
        and protect it at your edge (IP allow list, private network, or your own gateway auth).

        **Response `call_sid`:** use as your **`call_id`** when present; billing may also track internal session ids.
      operationId: createOutboundCall
      security: []
      parameters:
        - name: phoneNumber
          in: query
          required: true
          schema:
            type: string
          example: "+15551234567"
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: agent_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: workflow_id
          in: query
          schema:
            type: string
            format: uuid
        - name: phone_number_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Call queued / initiated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                description: Success payload; fields vary by telephony backend (`call_sid` when returned).
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                  provider:
                    type: string
                    description: Internal backend key for this dial.
                  call_sid:
                    type: string
                    description: External call identifier when available — use as call_id.
                  from_phone_number:
                    type: string
                  user_id:
                    type: string
                    format: uuid
        "402":
          description: Billing / credits — user cannot start metered usage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "403":
          description: Invalid Origin header (when `Origin` is sent and fails 
            validation)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "500":
          description: Telephony configuration error (e.g. no from-number for 
            user) or provider failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
