openapi: 3.1.0
info:
  title: Kupe Voice Agent API
  description: |
    **Production base URL:** `https://api.kupe.in` — prepend it to each **path** below to get the full request URL.

    | Path | Full URL |
    |------|----------|
    | `GET /health` | `https://api.kupe.in/health` |
    | `GET /api/v1/me` | `https://api.kupe.in/api/v1/me` (requires `x-api-key` **or** `Authorization: Bearer`) |
    | `POST /api/v1/phone/mapping` | `https://api.kupe.in/api/v1/phone/mapping` (inbound line → agent/workflow) |
    | `GET /api/v1/agents` | `https://api.kupe.in/api/v1/agents` |
    | `POST /api/v1/agents/simple` | `https://api.kupe.in/api/v1/agents/simple` |
    | `GET/PUT/DELETE /api/v1/agents/{agent_id}` | `https://api.kupe.in/api/v1/agents/{agent_id}` |
    | `GET /api/v1/providers/model` | `https://api.kupe.in/api/v1/providers/model` |
    | `GET /api/v1/providers/tts` | `https://api.kupe.in/api/v1/providers/tts` |
    | `GET /api/v1/providers/stt` | `https://api.kupe.in/api/v1/providers/stt` |
    | `GET /api/v1/providers/all` | `https://api.kupe.in/api/v1/providers/all` |
    | `GET /api/v1/tts-voices` | `https://api.kupe.in/api/v1/tts-voices` |
    | `POST /api/call/create_call` | `https://api.kupe.in/api/call/create_call` |
    | `POST /api/v1/files/upload` | `https://api.kupe.in/api/v1/files/upload` |
    | `GET /api/v1/files/supported-formats` | `https://api.kupe.in/api/v1/files/supported-formats` |
    | `GET /api/v1/files/user/{user_id}` | `https://api.kupe.in/api/v1/files/user/{user_id}` |
    | `GET/DELETE /api/v1/files/{file_id}` | `https://api.kupe.in/api/v1/files/{file_id}` |
    | `POST /api/v1/agent-files-mappings/create` | `https://api.kupe.in/api/v1/agent-files-mappings/create` |
    | `GET /api/v1/agent-files-mappings/agent/{agent_id}` | `https://api.kupe.in/api/v1/agent-files-mappings/agent/{agent_id}` |
    | `DELETE .../agent/{agent_id}/file/{upload_file_id}` | `https://api.kupe.in/api/v1/agent-files-mappings/agent/{agent_id}/file/{upload_file_id}` |
    | `POST /api/v1/search/semantic` | `https://api.kupe.in/api/v1/search/semantic` |
    | `POST /api/v1/search/hybrid` | `https://api.kupe.in/api/v1/search/hybrid` |
    | `GET /api/v1/call-analytics` | `https://api.kupe.in/api/v1/call-analytics` (list / `page`+`page_size` / `?request_id=` one session) |
    | `GET /api/v1/call-analytics/export` | Export call logs (ZIP); query `request_id` or date range |
    | `GET /api/v1/billing/credit-balance` | `https://api.kupe.in/api/v1/billing/credit-balance` |
    | `GET /api/v1/billing/usage/records` | Usage grouped by session (cost, duration, agent) |
    | `GET /api/v1/billing/usage/export` | Export usage (CSV/JSON per backend) |
    | `GET /api/v1/billing/usage/summary` | Aggregated usage for charts |
    | `GET /api/v1/billing/usage-records` | Usage organized by call sessions |
    | `GET /api/v1/tool-endpoint-defs` | List or create HTTP tool definitions |
    | `GET /api/v1/tools-mcp-server-defs` | List or create MCP server tool definitions |
    | `GET/POST/PATCH /api/v1/agents/{agent_id}/tools` | Agent tool mappings |

    **Try it / API playground:** Response bodies use **schemas** (and prose on each operation) so the playground shows your **live** result after **Send**, without a second static “example response” panel duplicating the same JSON. Illustrative JSON still appears **in the page text** where noted (for example `GET /health`).

    **Errors** from the FastAPI backend are typically `{ "detail": "…" }` — see `ErrorDetail` in **Schemas**.

    REST APIs for voice agents, providers, outbound PSTN calls, knowledge (files + RAG), and **documented webhook payloads**
    your server receives when you configure post-call HTTP integrations.

    **Field mapping (client spec):** `name` → `agent.name`; `prompt` → `agent_model_config.system_prompt`;
    `transcriber` / `model` / `voice` → nested configs on **`PUT /api/v1/agents/{agent_id}`** (after **`POST /api/v1/agents/simple`**); `call_type` inbound/outbound →
    dashboard phone mapping + `POST /api/call/create_call`; `extracted_variables` → post-analysis structured output;
    `context_params` → bring your own telephony metadata (stock outbound uses query params).

    **LLM / TTS / STT:** pass **catalog codes** (`model_name`, `provider_name`, or `provider:model_name` for TTS) or row UUIDs — the API **resolves codes to internal ids** before save (never send arbitrary strings as UUIDs). VAD and inferencing toggles are **not** in the default create body; the platform applies defaults. See [Model providers](/assistants/model-providers) and [Supported models & providers](/supported-models).
  version: "1.0.0"

servers:
  - url: https://api.kupe.in
    description: Production

tags:
  - name: Service
    description: Public health check and authenticated **current user** profile.
  - name: "Current user"
    description: Signed-in user id, email, and avatar (`GET /api/v1/me`).
  - name: "Incoming calls"
    description: >
      Map an assistant or workflow to a **purchased phone line** so inbound PSTN hits the right runtime.
      Use **E.164** numbers where possible (e.g. **+91**… for India, **+1**… for the US).
  - name: "Call logs"
    description: >
      Call session analytics: list, pagination, single session by `request_id`, and exports.
      Responses may include `post_call_analysis_results` when policy allows.
  - name: "Billing and usage"
    description: >
      Credit balance, usage records, and per-session cost breakdowns.
      With **`x-api-key`**, only **GET** (and HEAD/OPTIONS) are allowed on `/api/v1/billing/**`;
      checkout and other writes require a **Bearer** session token.
  - name: "Tools and MCP"
    description: >
      Custom HTTP tool definitions, MCP server definitions, and attaching tools to agents
      (`/api/v1/agents/{agent_id}/tools`).
  - name: "Post-call analysis"
    description: >
      User-scoped analysis rules (`/api/v1/post-analysis/rules`) and mapping rules to agents
      (`/api/v1/agents/{agent_id}/post-analysis`).
  - name: "API keys"
    description: Create, list, rename (label), and revoke Kupe API keys for integrations.
  - name: "Agent Management"
    description: List, create (defaults), read, update, and delete voice agents.
  - name: Providers
    description: LLM, TTS, and STT catalogs plus TTS voice rows (`GET /api/v1/tts-voices`).
  - name: "Outbound calls"
    description: Initiate outbound PSTN calls.
  - name: "Knowledge base"
    description: Files, agent–file mappings, and semantic or hybrid RAG search.
  - name: Webhooks
    description: Example payloads Kupe can POST to **your** HTTPS URL 
      (post-analysis HTTP tool).

security:
  - KupeApiKey: []

components:
  securitySchemes:
    KupeApiKey:
      type: apiKey
      in: header
      name: x-api-key
      description: Kupe dashboard API key for your user.
      x-default: "YOUR_KUPE_API_KEY"
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase session JWT from the Kupe dashboard (same token the app uses).

  schemas:
    MeResponse:
      type: object
      required: [user_id, auth]
      properties:
        user_id:
          type: string
          format: uuid
          description: Supabase Auth user id for this session.
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        profile_image_url:
          type: string
          format: uri
          nullable: true
          description: From `user_metadata` (e.g. `avatar_url`, `picture`) or provider identities when available.
        auth:
          type: string
          enum: [bearer, api_key]
        full_name:
          type: string
          nullable: true
        user_metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: Sanitized copy of public metadata keys (no secrets).

    AgentPhoneMappingRequest:
      type: object
      required: [phone_number_id, webhook_url, config_source, user_id]
      description: >
        Link exactly one of **`agent_id`** or **`workflow_id`** to a **`phone_number_id`**.
        `config_source` and `webhook_url` must match the inbound configuration for that line in Kupe.
      properties:
        agent_id:
          type: string
          format: uuid
          nullable: true
        workflow_id:
          type: string
          format: uuid
          nullable: true
        phone_number_id:
          type: string
          format: uuid
        webhook_url:
          type: string
          format: uri
          example: "https://api.kupe.in/api/call/incoming_call"
        config_source:
          type: string
          description: Line routing label stored with the mapping (must match dashboard / deployment).
        user_id:
          type: string
          format: uuid
          description: Owner of the phone line (use `GET /api/v1/me` when integrating with your own key).

    ErrorDetail:
      type: object
      properties:
        detail:
          type: string
          example: "Forbidden: API Key does not have required scopes"

    CreateAgentRequest:
      type: object
      description: >
        Body for **`PUT /api/v1/agents/{agent_id}`** (partial update). Same nested shape as a full agent payload;
        omitted keys are left unchanged. Not used for `POST /api/v1/agents/simple`.
      required: [agent]
      properties:
        agent:
          type: object
          required: [name]
          properties:
            name:
              type: string
              example: "Support Voice Agent"
            description:
              type: string
            is_active:
              type: boolean
              default: true
            recording_enabled:
              type: boolean
              default: true
        agent_model_config:
          $ref: "#/components/schemas/ModelConfig"
        tts_config:
          $ref: "#/components/schemas/TtsConfig"
        transcriber_config:
          $ref: "#/components/schemas/TranscriberConfig"
        agent_specific_config:
          $ref: "#/components/schemas/AgentSpecificConfigInput"

    ModelConfig:
      type: object
      description: >
        **`model_name`**: LLM catalog code or row UUID. Requests may also send the legacy property
        **`model_provider_id`** with the same meaning (OpenAPI lists one field to avoid duplicate inputs).
      properties:
        model_name:
          type: string
          description: LLM catalog code or row UUID (`GET /api/v1/providers/model`).
          example: "gpt-4.1-mini"
        temperature:
          type: number
          format: float
          example: 0.7
        max_tokens:
          type: integer
          example: 256
        system_prompt:
          type: string
          example: "You are a concise voice assistant for billing questions."

    TtsConfig:
      type: object
      description: >
        **`tts_model_name`** selects the TTS row (catalog code or UUID). Optional **`language`** sets
        `voice_parameters.language` (e.g. `en`, `hi-IN`). Legacy body key **`tts_provider_id`** is accepted as an alias for
        `tts_model_name` only (not listed as a second field).
      properties:
        tts_model_name:
          type: string
          description: TTS catalog code or row UUID (`GET /api/v1/providers/tts`).
          example: "bulbul:v2"
        language:
          type: string
          description: TTS locale / voice language (stored in `voice_parameters.language`).
          example: "hi-IN"
        voice_name:
          type: string
          example: "Anushka"
        voice_parameters:
          type: object
          additionalProperties: true
          example: {"speed": 1.0}

    TranscriberConfig:
      type: object
      required: [transcriber_model_name, language]
      description: >
        **`transcriber_model_name`** selects the STT row (catalog code or UUID, e.g. `saarika:2.5`).
        **`language`** is a locale string (e.g. `hi-IN`); a single-element array `["hi-IN"]` is coerced to that string.
        The pipeline STT model id is derived from the catalog row only — it is not sent in this object.
        Legacy **`provider_id`** is an alias for `transcriber_model_name`.
      properties:
        transcriber_model_name:
          type: string
          description: STT catalog code or row UUID (`GET /api/v1/providers/stt`).
          example: "saarika:2.5"
        language:
          type: string
          description: >
            STT locale. **Sarvam:** BCP-47 (`hi-IN`, `gu-IN`). **Others:** often short codes (`hi`, `en`). See
            [Model providers](/assistants/model-providers).
          example: "hi-IN"

    AgentSpecificConfigInput:
      type: object
      description: >
        Optional behavior overrides (merged onto platform defaults). Omitted keys keep defaults.
      properties:
        session_timeout:
          type: integer
          minimum: 1
          maximum: 86400
          default: 180
        end_of_speech_timeout:
          type: number
          minimum: 0
          default: 1.5
        llm_conversation_stop_enabled:
          type: boolean
          default: false
        auto_terminate_call:
          type: boolean
          default: false
        caller_gender_detection_enabled:
          type: boolean
          default: true
        max_output_tokens:
          type: integer
          minimum: 1
          default: 370
        timezone:
          type: string
          default: "Asia/Kolkata"
        inbound_transfer_call_number:
          type: string
          description: Legacy single PSTN target (digits). Prefer `inbound_transfer_routes`.
        inbound_transfer_trigger_condition:
          type: string
          description: Legacy NL condition for the single-number transfer.
        inbound_transfer_routes:
          type: array
          description: Multiple conditional PSTN transfer targets (`transfer_call` with `route_id`).
          items:
            type: object
            properties:
              route_id:
                type: string
                description: Stable id for `transfer_call` (optional; auto if omitted).
              display_name:
                type: string
              enabled:
                type: boolean
                default: true
              condition_when_to_transfer:
                type: string
                description: When the model should offer this transfer.
              phone_number:
                type: string

    VadConfig:
      type: object
      required: [vad_provider_id]
      properties:
        vad_provider_id:
          type: string
          description: >
            Internal VAD provider row UUID (dashboard / advanced update flows). Not part of
            `POST /api/v1/agents/simple` — default create uses platform VAD defaults.
          example: "00000000-0000-0000-0000-000000000000"
        threshold:
          type: number
          example: 0.5
        min_speech_duration_ms:
          type: number
          example: 250
        min_silence_duration_ms:
          type: number
          example: 500
        max_allowed_silence_duration:
          type: number
          example: 0
        sampling_rate:
          type: number
          example: 16000

    CreateAgentResponse:
      type: object
      description: Complete agent response (abridged).
      properties:
        agent:
          type: object
          properties:
            id:
              type: string
              format: uuid
              description: Use as **agent_id** everywhere.
            name: {type: string}
            user_id: {type: string, format: uuid}
            is_active: {type: boolean}
        configurations:
          type: object
        validation_status:
          type: string
          example: "valid"

    SimpleCreateAgentRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    CreateMappingRequest:
      type: object
      required: [agent_id, upload_file_id]
      properties:
        agent_id:
          type: string
          format: uuid
        upload_file_id:
          type: string
          format: uuid

    SemanticSearchBody:
      type: object
      required: [query]
      properties:
        query:
          type: string
        limit:
          type: integer
          default: 10
        similarity_threshold:
          type: number
          default: 0.5

    HybridSearchBody:
      type: object
      required: [query]
      properties:
        query:
          type: string
        limit:
          type: integer
          default: 5
        keyword_weight:
          type: number
          default: 0.4
        semantic_weight:
          type: number
          default: 0.6
        similarity_threshold:
          type: number
          default: 0.85

    CallCompletedPayload:
      type: object
      description: >
        Example payload Kupe can POST to your URL when you model it in post-analysis
        / HTTP tool schema.
        Shape is **defined by your tool**; this object lists common fields clients
        ask for.
      properties:
        call_id:
          type: string
          description: Often the carrier call id or an internal session id.
        call_duration:
          type: number
          description: Seconds.
        extracted_variables:
          type: object
          additionalProperties: true
        call_status:
          type: string
          example: "completed"
        summary:
          type: string
        full_conversation:
          type: string
          description: Full transcript text.
        recording_url:
          type: string
          format: uri
        from_number:
          type: string
        to_number:
          type: string
        cost:
          type: number
        sentiment_analysis:
          type: object
          additionalProperties: true

    CallErrorPayload:
      type: object
      properties:
        call_id:
          type: string
        error_reason:
          type: string
          example: "Invalid destination number"

    KupeSuccessResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        data:
          description: Payload or null
          nullable: true

    RagSearchResponseBody:
      type: object
      description: >
        Returned by `POST /api/v1/search/semantic` and `POST /api/v1/search/hybrid`.
        `data` is chunk text strings. `scores`: **semantic** returns a parallel list
        of numeric distances;
        **hybrid** returns objects `{ combined_score, distance, sparse_score }` per
        chunk.
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            type: string
          description: Matching chunk texts
        scores:
          type: array
          description: Parallel to `data` — numbers (semantic) or score objects 
            (hybrid).
          items: {}

    ModelProviderRowExample:
      type: object
      description: Example row shape from `model_providers` (fields vary by 
        deployment).
      properties:
        id:
          type: string
          format: uuid
        provider_name:
          type: string
        model_name:
          type: string
        is_large_model:
          type: boolean
        default_temperature:
          type: number
        api_base:
          type: string
        is_default:
          type: boolean

    ArbitraryJson:
      type: object
      additionalProperties: true
      description: >
        Deployment-specific JSON (call sessions, billing views, tool defs).
        See prose on each operation and the **Platform REST APIs** guide page.

paths:
  /health:
    get:
      tags: [Service]
      summary: Health check (no API key)
      description: |
        **Full URL:** `GET https://api.kupe.in/health`

        Public readiness probe. Use **Try it** to confirm connectivity before calling
        authenticated routes.

        **Reference shape (illustrative)** — fields match production; `timestamp` is a Unix float from the server.

        ```json
        {
          "status": "healthy",
          "timestamp": 1776969467.659134,
          "service": "milli-ai-backend",
          "database": "connected",
          "version": "1.0.0"
        }
        ```
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/me:
    get:
      tags: ["Current user"]
      summary: Current user profile
      description: |
        **Full URL:** `GET https://api.kupe.in/api/v1/me`

        Returns the authenticated **user id** (`user_id`), **email**, optional **phone**, and **profile_image_url**
        when the Supabase Auth user has avatar fields in `user_metadata` or OAuth **identities** (`picture`, etc.).

        **Auth:** send **`x-api-key`** (integration) **or** **`Authorization: Bearer`** with the Supabase JWT (dashboard session).
        With an API key, the server resolves your **owner user id** and enriches profile fields via the Auth admin API.
      operationId: getCurrentUser
      security:
        - KupeApiKey: []
        - BearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "403":
          description: Forbidden (RBAC or scopes)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
  /api/v1/phone/mapping:
    post:
      tags: ["Incoming calls"]
      summary: Map agent or workflow to a phone line
      description: |
        **Full URL:** `POST https://api.kupe.in/api/v1/phone/mapping`

        Attaches an **agent** (or **workflow**) to a **phone_numbers** row so inbound PSTN on that line
        reaches the correct assistant. Phone numbers should be provisioned in **E.164** where possible
        (e.g. **+91**xxxxxxxxxx for India, **+1**xxxxxxxxxx for the US).

        Send exactly one of **`agent_id`** or **`workflow_id`**. **`user_id`** must own the line.
      operationId: createAgentPhoneMapping
      security:
        - KupeApiKey: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentPhoneMappingRequest"
            example:
              agent_id: "00000000-0000-0000-0000-000000000001"
              phone_number_id: "00000000-0000-0000-0000-000000000002"
              webhook_url: "https://api.kupe.in/api/call/incoming_call"
              config_source: "primary-inbound"
              user_id: "00000000-0000-0000-0000-000000000003"
      responses:
        "200":
          description: Mapping created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Validation error (missing ids, both agent and workflow, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
  /api/v1/agents:
    get:
      tags: ["Agent Management"]
      summary: List agents
      description: |
        **Full URL:** `GET https://api.kupe.in/api/v1/agents` (optional query `?page=1&page_size=20&scope=all&q=…`)

        Returns agents for the authenticated user. Super-admins may use `scope`, `page`, `page_size`, and filters.
        Non–super-admin responses are typically a JSON array of agent summaries.
      operationId: listAgents
      parameters:
        - name: page
          in: query
          schema: {type: integer, minimum: 1, default: 1}
        - name: page_size
          in: query
          schema: {type: integer, minimum: 1, maximum: 100, default: 20}
        - name: scope
          in: query
          schema: {type: string, enum: [mine, all]}
        - name: q
          in: query
          description: Search agent name (super-admin list mode).
          schema: {type: string}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "403":
          description: Forbidden (RBAC or feature disabled)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
  /api/v1/agents/simple:
    post:
      tags: ["Agent Management"]
      summary: Create agent (defaults)
      description: |
        **Full URL:** `POST https://api.kupe.in/api/v1/agents/simple`

        Creates an agent with default STT/LLM/TTS/VAD for the user.
      operationId: createAgentSimple
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimpleCreateAgentRequest"
            example:
              name: "Quickstart Agent"
              description: "Uses platform defaults"
      responses:
        "201":
          description: Created — returns `CreateAgentResponse` (`agent.id` is **agent_id**)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAgentResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
