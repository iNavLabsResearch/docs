  /api/v1/search/semantic:
    post:
      tags: ["Knowledge base"]
      summary: Semantic search (RAG)
      description: |
        **Full URL:** `POST https://api.kupe.in/api/v1/search/semantic?agent_id={uuid}`

        Vector search scoped to `agent_id` chunk metadata.

        **Auth:** excluded from `x-api-key` in the backend (same as `create_call`) — secure at the edge if exposed publicly.
      operationId: semanticSearch
      security: []
      parameters:
        - name: agent_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SemanticSearchBody"
            example:
              query: "refund policy"
              limit: 8
              similarity_threshold: 0.55
      responses:
        "200":
          description: Chunk texts + numeric scores (cosine distance; lower = 
            more similar when returned).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagSearchResponseBody"
        "400":
          description: Missing `agent_id` or empty query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "500":
          description: Vector DB or internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
  /api/v1/search/hybrid:
    post:
      tags: ["Knowledge base"]
      summary: Hybrid search (RAG)
      description: |
        **Full URL:** `POST https://api.kupe.in/api/v1/search/hybrid?agent_id={uuid}`

        Hybrid keyword + vector search. When the vector backend does not expose sparse/BM25 on this path,
        Kupe returns semantic-only results with **per-item score objects** (not raw floats).

        **Auth:** excluded from `x-api-key` in the backend — secure at the edge if exposed publicly.
      operationId: hybridSearch
      security: []
      parameters:
        - name: agent_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HybridSearchBody"
            example:
              query: "cancellation fee"
              limit: 10
              keyword_weight: 0.4
              semantic_weight: 0.6
              similarity_threshold: 0.85
      responses:
        "200":
          description: Chunk texts + hybrid score objects (semantic fallback 
            path).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagSearchResponseBody"
        "400":
          description: Missing `agent_id` or empty query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /api/v1/call-analytics:
    get:
      tags: ["Call logs"]
      summary: List or fetch call sessions (call logs)
      description: |
        **Full URL:** `GET https://api.kupe.in/api/v1/call-analytics`

        - **`request_id`**: one session by internal request id (404 if not found).
        - **`page` + `page_size`**: paginated `{ items, total, page, page_size }`.
        - **Neither**: full list (subject to `call_analytics` / `call_logs` feature flags).

        Query **`filter`**: search request id or call type. Super-admins may pass `scope`, `organization_ids`,
        `owner_user_ids`, `platform_roles`, etc., per backend support.

        Session JSON may include **`post_call_analysis_results`** and related fields when not HIPAA-redacted.
      operationId: getCallAnalytics
      parameters:
        - name: request_id
          in: query
          schema: { type: string }
          description: When set, return exactly one session.
        - name: page
          in: query
          schema: { type: integer, minimum: 1 }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1, maximum: 100 }
        - name: filter
          in: query
          schema: { type: string }
          description: Search request_id or call type (alias for backend `search_filter`).
        - name: scope
          in: query
          schema: { type: string }
        - name: organization_ids
          in: query
          schema: { type: string }
        - name: owner_user_ids
          in: query
          schema: { type: string }
      responses:
        "200":
          description: One session, paginated wrapper, or array — see backend behavior.
          content:
            application/json:
              schema:
