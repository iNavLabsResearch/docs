webhooks:
  voiceCallCompleted:
    post:
      security: []
      tags: [Webhooks]
      summary: Call completed (your HTTPS endpoint)
      description: >
        **Inbound to your server.** Configure via agent **Post analysis** → HTTP integration
        / structured output.
        Map fields in your tool schema so Kupe’s POST matches this example.
      operationId: webhookCallCompleted
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallCompletedPayload"
            example:
              call_id: "CAaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
              call_duration: 132.4
              extracted_variables:
                intent: "billing"
                account_last4: "4242"
              call_status: "completed"
              summary: "User asked about invoice; agent explained charges."
              full_conversation: "Agent: Hi…\nUser: …"
              recording_url: "https://example.com/recording.mp3"
              from_number: "+15550001111"
              to_number: "+15550002222"
              cost: 0.12
              sentiment_analysis:
